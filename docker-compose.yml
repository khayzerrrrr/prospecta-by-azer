version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: visitflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: visitflow
      POSTGRES_PASSWORD: visitflow_secret
      POSTGRES_DB: visitflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/db/drizzle:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4
    container_name: visitflow-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@visitflow.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
